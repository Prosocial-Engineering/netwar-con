<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <g fill="#eaff00" stroke="#0c0c0c" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round">
    <!-- closed fist glove -->
    <path d="M10,19 q0,-3.2 3.2,-3.2 h13.6 q3.2,0 3.2,3.2 v6 q0,9 -10,10.5 q-10,-1.5 -10,-10.5 Z"/>
    <!-- knuckles -->
    <circle cx="13.6" cy="18.4" r="2.4"/>
    <circle cx="18.6" cy="17.8" r="2.6"/>
    <circle cx="23.6" cy="17.8" r="2.6"/>
    <circle cx="28"   cy="18.6" r="2.4"/>
    <!-- thumb curled across -->
    <rect x="6" y="22" width="9" height="5" rx="2.5" transform="rotate(-18 10.5 24.5)"/>
  </g>
  <!-- biohazard mark on the back of the fist -->
  <g fill="none" stroke="#0c0c0c" stroke-width="1.1">
    <circle cx="20"   cy="26"   r="1.6"/>
    <circle cx="17.2" cy="29.2" r="1.6"/>
    <circle cx="22.8" cy="29.2" r="1.6"/>
  </g>
</svg>
