    <rect x="8.4"  y="11" width="4.6" height="13" rx="2.3"/>
    <rect x="13.9" y="8"  width="4.6" height="16" rx="2.3"/>
    <rect x="19.4" y="8"  width="4.6" height="16" rx="2.3"/>
    <rect x="24.9" y="11" width="4.6" height="13" rx="2.3"/>
    <rect x="3.5"  y="19" width="8"  height="5"  rx="2.5" transform="rotate(-38 7.5 21.5)"/>
  </g>
  <!-- biohazard mark on the palm -->
  <g fill="none" stroke="#0c0c0c" stroke-width="1.1">
    <circle cx="20"   cy="27"   r="1.6"/>
    <circle cx="17.2" cy="30.2" r="1.6"/>
    <circle cx="22.8" cy="30.2" r="1.6"/>
